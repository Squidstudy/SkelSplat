
defaults:
  - _self_

hydra:
  run:
    dir: "experiments/h36m/${now:%Y-%m-%d}/${now:%H-%M-%S}"

dataset:
  data_root: "data/h36m"
  initial_guess: "metrabs"  # 3d_gt | metrabs | resnet | cpn | triang_metrabs | triang_resnet | triang_cpn | triang_gt 
  poses_2d: "metrabs"  # gt | metrabs | resnet | cpn
  start_scene_id: 0
  end_scene_id: 2181  # 要跑幾禎(scene)
  frame_step: 64 #抽樣, 每多少取一禎
  nviews: 4 # how many camera

training:
  quiet: true # train.py main() safe_state(train.quiet) calls utils/general_utils.py : true=>eat print => prevent terminal flooded
  std_dev_noise: 0.0 #正式訓練不會刻意用髒自己的原始猜測
  dropout: false # if GT heatmaps 隨機拿掉關節標註 (穩健度測試用)
  accumulation_steps: 4 # 每幾步更新3DGs -> same as nviews
  loss_function: "l2_gaussian" # what kind of loss (see utils/loss_utils.py)
  lambda_loss_function: 0.05  # used only if loss function is combination of multiple losses
  consistency_loss: "3D_length_consistency" # none | limb_consistency
  lambda_consistency: 1e-5
  early_stopping: "no_stopping"  # opt_early_stopping | no_stopping
  
debug:
  save_iterations: [500] # 第幾步的時候把3DGs 存成.ply
  save_images: true

model:
  sh_degree: 1 #不參與
  resolution: -1 #使用原始resolution(解析度)
  white_background: false
  train_test_exp: false
  data_device: "cuda"
  eval: false
  opacity_on: true #if opacity in optimization
  scaling: 3 #3DGs initial radius
  scaling_modifier: 1.0 # peripheral joints(末梢關節) 放大倍率

#查 render_functions 字典決定用哪一個 CUDA 光柵化器（對應關節數 17）。其餘四個都是關掉狀態的除錯／效能選項
pipeline:
  rendering: diff-gaussian-rasterization-h36m  # diff-gaussian-rasterization | diff-gaussian-rasterization-no-depth
  convert_SHs_python: false
  compute_cov3D_python: false
  debug: false
  antialiasing: false

optimization:
  iterations: 500
  position_lr_init: 0.0005
  position_lr_final: 0.000005
  position_lr_delay_mult: 0.0
  position_lr_max_steps: 4000
  feature_lr: 0.0 #顏色雨不透明度的學習率設為0, 永遠不會更新
  opacity_lr: 0.0
  scaling_lr: 0.005
  rotation_lr: 0.001
  exposure_lr_init: 0.01
  exposure_lr_final: 0.001
  exposure_lr_delay_steps: 0
  exposure_lr_delay_mult: 0.0
  percent_dense: 0.01
  lambda_dssim: 0.2
  densification_interval: 100
  opacity_reset_interval: 3000
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_grad_threshold: 0.0002
  depth_l1_weight_init: 1.0
  depth_l1_weight_final: 0.01
  random_background: false
  optimizer_type: "default"
